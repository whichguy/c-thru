<!DOCTYPE html>
<!-- Iframe shell for versioned deployments. Vars: environment, iframeUrl, urlPreview, timeout -->
<html>
<head>
  <base target="_top">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; font-family:'Google Sans',Roboto,sans-serif; background:#fff; }
    iframe { border:none; width:100%; height:100%; display:none; }
    .loader { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#5f6368; }
    .loader .spinner { width:40px; height:40px; border:3px solid #e0e0e0; border-top-color:#1a73e8; border-radius:50%; animation:spin 1s linear infinite; }
    .loader .label { margin-top:16px; font-size:14px; }
    .loader .env { font-size:12px; color:#9aa0a6; margin-top:4px; max-width:90%; word-break:break-all; text-align:center; }
    .error { display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#d93025; text-align:center; padding:20px; box-sizing:border-box; }
    .error .material-icons { font-size:48px; margin-bottom:16px; }
    .error p { margin:8px 0; }
    .error .hint { font-size:12px; color:#5f6368; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="label">Loading <?= environment ?>...</div>
    <div class="env"><?= urlPreview ?></div>
  </div>
  <div class="error" id="error">
    <span class="material-icons">error_outline</span>
    <p>Failed to load <?= environment ?> deployment.</p>
    <p class="hint">Check that the deployment exists and you have access.</p>
  </div>
  <iframe id="content" src="<?= iframeUrl ?>" onload="onLoad()" onerror="onError()" allow="clipboard-read; clipboard-write"></iframe>
  <script>
    var loaded=false, t=setTimeout(function(){if(!loaded)showErr();}, <?= timeout || 15000 ?>);
    function onLoad(){if(loaded)return;loaded=true;clearTimeout(t);document.getElementById('loader').style.display='none';document.getElementById('content').style.display='block';}
    function onError(){clearTimeout(t);showErr();}
    function showErr(){document.getElementById('loader').style.display='none';document.getElementById('error').style.display='flex';}
  </script>
</body>
</html>
